name: grwm
description: "Her Style Co. — AI-powered personal stylist."
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.6.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # State management
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Navigation
  go_router: ^14.6.2

  # Supabase
  supabase_flutter: ^2.8.0

  # Image handling
  image_picker: ^1.1.2
  image: ^4.3.0
  cached_network_image: ^3.4.1

  # Sharing
  share_plus: ^10.1.3

  # Environment
  flutter_dotenv: ^5.2.1

  # Serialization
  freezed_annotation: ^2.4.4
  json_annotation: ^4.9.0

  # HTTP
  http: ^1.2.2

  # UUID
  uuid: ^4.5.1

  # Path
  path: ^1.9.0
  path_provider: ^2.1.5

  # Permissions
  permission_handler: ^11.3.1

  # Calendar
  table_calendar: ^3.1.2

  # Charts
  fl_chart: ^0.69.0

  # URL launcher
  url_launcher: ^6.3.1

  # App info
  package_info_plus: ^8.1.0

  # Fonts
  google_fonts: ^6.2.1

  # Location
  geolocator: ^13.0.1

  # Observability
  sentry_flutter: ^8.10.1

  # Analytics (web-supported)
  posthog_flutter: ^4.10.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  build_runner: ^2.4.13
  freezed: ^2.5.7
  json_serializable: ^6.8.0
  riverpod_generator: ^2.6.2

flutter:
  uses-material-design: true

  assets:
    # WARNING: .env is bundled as an asset for local dev only. For production web
    # builds, rely on --dart-define to inject credentials; never rely on the asset
    # being served. Ideally all API secrets should move to a server-side proxy.
    - .env
    - assets/images/
    - assets/models/
