name: Build & Deploy to Cloudflare Pages

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  # ── Quality gate: format + analyze + test on every push/PR ─────────────
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - run: flutter pub get

      - name: Create placeholder .env
        # pubspec.yaml lists `.env` as an asset for local dev. It's gitignored,
        # so analyze complains about a missing asset unless we touch it here.
        run: touch .env

      - name: Format check
        # Fails the build if any file isn't formatted.
        run: dart format --set-exit-if-changed .

      - name: Static analysis
        # Fails only on real errors. Warnings + infos surface in logs but don't
        # block deploys (they'd make every small cleanup a blocker).
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      - name: Run tests
        run: flutter test --no-pub

  # ── Build + deploy. Only runs after verify passes. ─────────────────────
  deploy:
    needs: verify
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.41.6'
          channel: 'stable'
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Create placeholder .env
        # pubspec.yaml lists `.env` as an asset for local dev. It's gitignored,
        # so CI has to create an empty one before `flutter build` will succeed.
        # Real credentials are injected via --dart-define in the next step.
        run: touch .env

      - name: Build web
        # Credentials are injected at compile time via --dart-define so they
        # end up in the JS bundle (the .env asset is NOT reliable in prod).
        # SENTRY_DSN and POSTHOG_API_KEY are optional — services no-op if
        # blank.
        run: |
          flutter build web --release \
            --dart-define=SUPABASE_URL=${{ secrets.SUPABASE_URL }} \
            --dart-define=SUPABASE_ANON_KEY=${{ secrets.SUPABASE_ANON_KEY }} \
            --dart-define=SENTRY_DSN=${{ secrets.SENTRY_DSN }} \
            --dart-define=POSTHOG_API_KEY=${{ secrets.POSTHOG_API_KEY }} \
            --dart-define=APP_ENV=production

      - name: Add Cloudflare Pages config
        run: |
          echo '/*    /index.html    200' > build/web/_redirects
          cat > build/web/_headers << 'HEADERS'
          /*
            Strict-Transport-Security: max-age=31536000; includeSubDomains
            X-Content-Type-Options: nosniff
            X-Frame-Options: DENY
            Referrer-Policy: strict-origin-when-cross-origin
            Permissions-Policy: camera=(self), microphone=(), geolocation=(self), payment=()
            Content-Security-Policy: default-src 'self'; img-src 'self' data: blob: https://*.supabase.co https://images.unsplash.com https://*.unsplash.com; font-src 'self' https://fonts.gstatic.com data:; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; script-src 'self' 'wasm-unsafe-eval' https://www.gstatic.com; connect-src 'self' https://*.supabase.co wss://*.supabase.co https://www.gstatic.com https://fonts.gstatic.com https://fonts.googleapis.com https://generativelanguage.googleapis.com https://us.i.posthog.com https://us-assets.i.posthog.com https://*.ingest.sentry.io https://geocoding-api.open-meteo.com https://api.open-meteo.com; worker-src 'self' blob:; frame-ancestors 'none'; base-uri 'self'; form-action 'self'
          /main.dart.js
            Cache-Control: no-cache, must-revalidate
          /flutter_bootstrap.js
            Cache-Control: no-cache, must-revalidate
          /flutter_service_worker.js
            Cache-Control: no-cache, must-revalidate
          /flutter.js
            Cache-Control: no-cache, must-revalidate
          /index.html
            Cache-Control: no-cache
          /canvaskit/*
            Cache-Control: public, max-age=31536000, immutable
          /assets/fonts/*
            Cache-Control: public, max-age=31536000, immutable
          HEADERS

      - name: Deploy to Cloudflare Pages (Production)
        if: (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master') && github.event_name == 'push'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=her-style-co --branch=main --commit-dirty=true

      - name: Deploy to Cloudflare Pages (Preview)
        if: github.event_name == 'pull_request'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy build/web --project-name=her-style-co --branch=preview-${{ github.event.number }} --commit-dirty=true
